name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Unit tests
        run: make test
      - name: Integration tests
        run: make test-it
      - name: Case coverage
        run: make test-coverage-cases
      - name: Build
        run: make build
