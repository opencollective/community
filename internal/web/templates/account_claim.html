{{template "head" .}}
<main class="wizard">
  <section class="card">
    <h1>Claim your account</h1>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    <p class="sub">Enter the code from your email to take control of the
    account. Its identity, name and history carry over.</p>
    <form method="post" action="/accounts/claim">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="{{.Email}}" required>
      <label for="code">Code</label>
      <input id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]{6}" required>
      <button type="submit">Claim</button>
    </form>
  </section>
</main>
{{template "foot" .}}
