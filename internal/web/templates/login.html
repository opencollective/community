{{template "head" .}}
<main class="wizard">
  <section class="card">
    <h1>Log in</h1>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    {{if .Sent}}
    <p class="sub">If this address has an account, a 6-digit code is on its way
    to <strong>{{.Email}}</strong>.</p>
    <form method="post" action="/login">
      <input type="hidden" name="email" value="{{.Email}}">
      <label for="code">Enter the code</label>
      <input id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]{6}" required autofocus>
      <button type="submit">Log in</button>
    </form>
    {{else}}
    <p class="sub">No passwords. Your key stays on this server; logging in
    opens a signing session.</p>
    <form method="post" action="/login">
      <label for="email">Email address</label>
      <input id="email" name="email" type="email" required value="{{.Email}}" autofocus>
      <button type="submit">Send me a code</button>
    </form>
    {{end}}
  </section>
</main>
{{template "foot" .}}
